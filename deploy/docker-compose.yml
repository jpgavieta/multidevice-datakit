services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432" # Host:Container
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - app_net

  grafana:
    image: grafana/grafana:latest
    container_name: app_grafana
    restart: unless-stopped
    user: "0:0"
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    volumes:
      - ./grafana/grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboard-json:/var/lib/grafana/dashboards
    depends_on:
      - postgres
    networks:
      - app_net

volumes:
  pg_data:

networks:
  app_net:
    driver: bridge

# USAGE: docker compose -f deploy/docker-compose.yml up -d
# sanity check: docker logs app_postgres   